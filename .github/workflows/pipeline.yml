name: CI/CD Pipeline
run-name: "${{ github.workflow }} · ${{ github.event_name }} · ${{ github.ref_name }}"

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      JAVA_TOOL_OPTIONS: --enable-native-access=ALL-UNNAMED --sun-misc-unsafe-memory-access=allow
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2g -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build (assemble)
        run: ./gradlew clean assemble

  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      JAVA_TOOL_OPTIONS: --enable-native-access=ALL-UNNAMED --sun-misc-unsafe-memory-access=allow
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2g -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

  release_plan:
    name: "release-plan"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && !contains(github.event.head_commit.message, '[Gradle Release Plugin]')
    outputs:
      current_version: ${{ steps.plan.outputs.current_version }}
      release_version: ${{ steps.plan.outputs.release_version }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      new_version: ${{ steps.plan.outputs.new_version }}
      should_publish: ${{ steps.plan.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release plan
        id: plan
        shell: bash
        run: |
          CURRENT=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"

          if [[ "$CURRENT" != *"-SNAPSHOT" ]]; then
            echo "release_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "release_tag=v$CURRENT" >> "$GITHUB_OUTPUT"
            echo "new_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Current version is not SNAPSHOT; skipping release/publish."
            exit 0
          fi

          RELEASE_VERSION="${CURRENT%-SNAPSHOT}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEXT_PATCH-SNAPSHOT"

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Plan summary
        run: |
          echo "### Release plan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Current version: ${{ steps.plan.outputs.current_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release version: ${{ steps.plan.outputs.release_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Next version: ${{ steps.plan.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Should publish: ${{ steps.plan.outputs.should_publish }}" >> "$GITHUB_STEP_SUMMARY"

  release:
    name: "release-${{ needs.release_plan.outputs.release_version }}"
    runs-on: ubuntu-latest
    needs: release_plan
    if: needs.release_plan.outputs.should_publish == 'true'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      JAVA_TOOL_OPTIONS: --enable-native-access=ALL-UNNAMED --sun-misc-unsafe-memory-access=allow
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2g -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release (tag + bump next SNAPSHOT)
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          ./gradlew release \
            -Prelease.useAutomaticVersion=true \
            -Prelease.releaseVersion=${{ needs.release_plan.outputs.release_version }} \
            -Prelease.newVersion=${{ needs.release_plan.outputs.new_version }}

  publish:
    name: "publish-${{ needs.release_plan.outputs.release_version }}"
    runs-on: ubuntu-latest
    needs: [release_plan, release]
    if: needs.release_plan.outputs.should_publish == 'true'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      JAVA_TOOL_OPTIONS: --enable-native-access=ALL-UNNAMED --sun-misc-unsafe-memory-access=allow
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2g -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED"

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.release_plan.outputs.release_tag }}

      - name: Validate plugin ID namespace
        run: |
          if grep -R --line-number 'id = "modular\(\.|"\)' ./*/build.gradle.kts; then
            echo "❌ Legacy plugin namespace found (modular.*). Expected emprestes.modular.*"
            exit 1
          fi
          if grep -R --line-number 'id = "modular\.modules' ./*/build.gradle.kts; then
            echo "❌ Legacy plugin namespace found (modular.modules.*). Expected emprestes.modular.*"
            exit 1
          fi
          echo "✅ Plugin namespace is emprestes.modular.*"

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Artifacts to publish
        run: |
          VERSION="${{ needs.release_plan.outputs.release_version }}"
          MODULES=(shared loader-plugin install-plugin kotlin-plugin javascript-plugin spring-boot-plugin)
          echo "### Artifacts to publish" >> "$GITHUB_STEP_SUMMARY"
          for m in "${MODULES[@]}"; do
            echo "- ${m}-${VERSION}.jar" | tee -a "$GITHUB_STEP_SUMMARY"
          done

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
